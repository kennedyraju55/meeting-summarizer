<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="900" height="250">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ec4b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#20a094;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="250" rx="16" fill="url(#bgGrad)" />

  <!-- Border accent -->
  <rect x="1" y="1" width="898" height="248" rx="16" fill="none" stroke="#2ec4b6" stroke-width="2" stroke-opacity="0.3" />

  <!-- Decorative circles -->
  <circle cx="80" cy="125" r="120" fill="#2ec4b6" opacity="0.03" />
  <circle cx="820" cy="125" r="100" fill="#2ec4b6" opacity="0.03" />
  <circle cx="450" cy="40" r="200" fill="#2ec4b6" opacity="0.02" />

  <!-- Decorative dots pattern -->
  <g opacity="0.08" fill="#2ec4b6">
    <circle cx="30" cy="30" r="2" />
    <circle cx="60" cy="30" r="2" />
    <circle cx="90" cy="30" r="2" />
    <circle cx="30" cy="60" r="2" />
    <circle cx="60" cy="60" r="2" />
    <circle cx="90" cy="60" r="2" />
    <circle cx="810" cy="190" r="2" />
    <circle cx="840" cy="190" r="2" />
    <circle cx="870" cy="190" r="2" />
    <circle cx="810" cy="220" r="2" />
    <circle cx="840" cy="220" r="2" />
    <circle cx="870" cy="220" r="2" />
  </g>

  <!-- Microphone icon area -->
  <g transform="translate(450, 80)" filter="url(#glow)">
    <text x="0" y="0" font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif" font-size="48" text-anchor="middle" fill="#2ec4b6">🎙️</text>
  </g>

  <!-- Title -->
  <text x="450" y="145" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#textShadow)">
    Meeting Summarizer
  </text>

  <!-- Accent underline -->
  <rect x="250" y="158" width="400" height="3" rx="2" fill="url(#accentGrad)" opacity="0.8" />

  <!-- Tagline -->
  <text x="450" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="0.5">
    AI-Powered Transcript Analysis, Action Items &amp; Decision Tracking
  </text>

  <!-- Tech badges -->
  <g transform="translate(285, 210)">
    <rect x="0" y="0" width="65" height="22" rx="11" fill="#2ec4b6" opacity="0.15" />
    <text x="32" y="15" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2ec4b6" text-anchor="middle">Gemma 4</text>

    <rect x="75" y="0" width="60" height="22" rx="11" fill="#2ec4b6" opacity="0.15" />
    <text x="105" y="15" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2ec4b6" text-anchor="middle">Ollama</text>

    <rect x="145" y="0" width="60" height="22" rx="11" fill="#2ec4b6" opacity="0.15" />
    <text x="175" y="15" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2ec4b6" text-anchor="middle">Python</text>

    <rect x="215" y="0" width="50" height="22" rx="11" fill="#2ec4b6" opacity="0.15" />
    <text x="240" y="15" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2ec4b6" text-anchor="middle">Local</text>

    <rect x="275" y="0" width="65" height="22" rx="11" fill="#2ec4b6" opacity="0.15" />
    <text x="307" y="15" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2ec4b6" text-anchor="middle">Private</text>
  </g>
</svg>
